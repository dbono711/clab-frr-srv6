name: frr-srv6

mgmt:
  network: br-frr-srv6
  ipv4-subnet: 172.28.1.0/24

topology:
  kinds:
    linux:
      image: quay.io/frrouting/frr:10.4.1
  nodes:

    # PROVIDER EDGE
    ## pe1
    pe1:
      kind: linux
      mgmt-ipv4: 172.28.1.2
      binds:
        - logs:/etc/frr/logs
        - pe1/daemons:/etc/frr/daemons
        - pe1/frr.conf:/etc/frr/frr.conf
        - pe1/vtysh.conf:/etc/frr/vtysh.conf
        - pe1/pe1.sh:/config/pe1.sh
      exec:
        - bash /config/pe1.sh
    
