name: frr-srv6

mgmt:
  network: br-frr-srv6
  ipv4-subnet: 172.28.1.0/24

topology:
  nodes:

    # PROVIDER EDGE
    ## r1
    r1:
      kind: linux
      image: quay.io/frrouting/frr:master
      mgmt-ipv4: 172.28.1.2
      binds:
        - logs:/etc/frr/logs
        - r1/daemons:/etc/frr/daemons
        - r1/frr.conf:/etc/frr/frr.conf
        - r1/vtysh.conf:/etc/frr/vtysh.conf
        - r1/r1.sh:/config/r1.sh
      exec:
        - bash /config/r1.sh
    
    ## r2
    r2:
      kind: linux
      image: quay.io/frrouting/frr:master
      mgmt-ipv4: 172.28.1.3
      binds:
        - logs:/etc/frr/logs
        - r2/daemons:/etc/frr/daemons
        - r2/frr.conf:/etc/frr/frr.conf
        - r2/vtysh.conf:/etc/frr/vtysh.conf
        - r2/r2.sh:/config/r2.sh
      exec: 
        - bash /config/r2.sh
  
    # PROVIDER CORE
    ## r3
    r3:
      kind: linux
      image: quay.io/frrouting/frr:master
      mgmt-ipv4: 172.28.1.4
      binds:
        - logs:/etc/frr/logs
        - r3/daemons:/etc/frr/daemons
        - r3/frr.conf:/etc/frr/frr.conf
        - r3/vtysh.conf:/etc/frr/vtysh.conf
        - r3/r3.sh:/config/r3.sh
      exec:
        - bash /config/r3.sh
    
    ## r4
    r4:
      kind: linux
      image: quay.io/frrouting/frr:master
      mgmt-ipv4: 172.28.1.5
      binds:
        - logs:/etc/frr/logs
        - r4/daemons:/etc/frr/daemons
        - r4/frr.conf:/etc/frr/frr.conf
        - r4/vtysh.conf:/etc/frr/vtysh.conf
        - r4/r4.sh:/config/r4.sh
      exec:
        - bash /config/r4.sh    
    
    ## r5
    r5:
      kind: linux
      image: quay.io/frrouting/frr:master
      mgmt-ipv4: 172.28.1.6
      binds:
        - logs:/etc/frr/logs
        - r5/daemons:/etc/frr/daemons
        - r5/frr.conf:/etc/frr/frr.conf
        - r5/vtysh.conf:/etc/frr/vtysh.conf
        - r5/r5.sh:/config/r5.sh
      exec:
        - bash /config/r5.sh     
    
    ## r6
    r6:
      kind: linux
      image: quay.io/frrouting/frr:master
      mgmt-ipv4: 172.28.1.7
      binds:
        - logs:/etc/frr/logs
        - r6/daemons:/etc/frr/daemons
        - r6/frr.conf:/etc/frr/frr.conf
        - r6/vtysh.conf:/etc/frr/vtysh.conf
        - r6/r6.sh:/config/r6.sh
      exec:
        - bash /config/r6.sh    
    
    # CLIENTS
    ## c1
    c1:
      kind: linux
      image: wbitt/network-multitool:alpine-extra
      mgmt-ipv4: 172.28.1.8
      binds:
        - clients/client1.sh:/tmp/client1.sh
      exec:
        - bash /tmp/client1.sh
    
    ## c2
    c2:
      kind: linux
      image: wbitt/network-multitool:alpine-extra
      mgmt-ipv4: 172.28.1.9
      binds:
        - clients/client2.sh:/tmp/client2.sh
      exec:
        - bash /tmp/client2.sh

    # LOGGING STACK
    promtail:
      kind: linux
      mgmt-ipv4: 172.28.1.10
      image: grafana/promtail:3.5.2
      binds:
        - promtail:/etc/promtail
        - logs:/var/log
      cmd: --config.file=/etc/promtail/promtail-config.yml
      ports:
        - 9080:9080

    loki:
      kind: linux
      mgmt-ipv4: 172.28.1.11
      image: grafana/loki:3.5.2
      binds:
        - loki:/etc/loki
      cmd: --config.file=/etc/loki/loki-config.yml
      ports:
        - 3100:3100
    
    # MONITORING STACK
    grafana:
      kind: linux
      mgmt-ipv4: 172.28.1.12
      image: grafana/grafana:12.0.2
      binds:
        - grafana/provisioning:/etc/grafana/provisioning
      ports:
        - 3000:3000
      env:
        GF_SECURITY_ADMIN_PASSWORD: "srv6labadmin"
        GF_USERS_ALLOW_SIGN_UP: "false"

  links:

    # CORE
    ## r3-r4
    - endpoints: ["r3:eth1", "r4:eth1"]
    ## r3-r5
    - endpoints: ["r3:eth2", "r5:eth2"]
    ## r4-r6
    - endpoints: ["r4:eth2", "r6:eth2"]
    ## r5-r6
    - endpoints: ["r5:eth1", "r6:eth1"]

    # EDGE
    ## r1
    - endpoints: ["r1:eth1", "r3:eth3"]
    - endpoints: ["r1:eth2", "r4:eth3"]
    ## r2
    - endpoints: ["r2:eth1", "r5:eth3"]
    - endpoints: ["r2:eth2", "r6:eth3"]
    
    # CLIENTS
    ## c1
    - endpoints: ["c1:eth1", "r1:eth3"]
    ## c2
    - endpoints: ["c2:eth1", "r2:eth3"]