name: frr-srv6

mgmt:
  network: br-frr-srv6
  ipv4-subnet: 172.28.1.0/24

topology:
  nodes:

    # PROVIDER EDGE
    ## r1
    r1:
      kind: linux
      image: quay.io/frrouting/frr:10.2.3
      mgmt-ipv4: 172.28.1.2
      binds:
        - r1/daemons:/etc/frr/daemons
        - r1/frr.conf:/etc/frr/frr.conf
        - r1/vtysh.conf:/etc/frr/vtysh.conf
    
    ## r2
    r2:
      kind: linux
      image: quay.io/frrouting/frr:10.2.3
      mgmt-ipv4: 172.28.1.3
      binds:
        - r2/daemons:/etc/frr/daemons
        - r2/frr.conf:/etc/frr/frr.conf
        - r2/vtysh.conf:/etc/frr/vtysh.conf
  
    # PROVIDER CORE
    ## r3
    r3:
      kind: linux
      image: quay.io/frrouting/frr:10.2.3
      mgmt-ipv4: 172.28.1.4
      binds:
        - r3/daemons:/etc/frr/daemons
        - r3/frr.conf:/etc/frr/frr.conf
        - r3/vtysh.conf:/etc/frr/vtysh.conf
    
    ## r4
    r4:
      kind: linux
      image: quay.io/frrouting/frr:10.2.3
      mgmt-ipv4: 172.28.1.5
      binds:
        - r4/daemons:/etc/frr/daemons
        - r4/frr.conf:/etc/frr/frr.conf
        - r4/vtysh.conf:/etc/frr/vtysh.conf
    
    ## r5
    r5:
      kind: linux
      image: quay.io/frrouting/frr:10.2.3
      mgmt-ipv4: 172.28.1.6
      binds:
        - r5/daemons:/etc/frr/daemons
        - r5/frr.conf:/etc/frr/frr.conf
        - r5/vtysh.conf:/etc/frr/vtysh.conf
     
    ## r6
    r6:
      kind: linux
      image: quay.io/frrouting/frr:10.2.3
      mgmt-ipv4: 172.28.1.7
      binds:
        - r6/daemons:/etc/frr/daemons
        - r6/frr.conf:/etc/frr/frr.conf
        - r6/vtysh.conf:/etc/frr/vtysh.conf

  links:

    # CORE
    ## r3-r4
    - endpoints: ["r3:eth1", "r4:eth1"]
    ## r3-r5
    - endpoints: ["r3:eth2", "r5:eth2"]
    ## r4-r6
    - endpoints: ["r4:eth2", "r6:eth2"]
    ## r5-r6
    - endpoints: ["r5:eth1", "r6:eth1"]

    # EDGE
    ## r1
    - endpoints: ["r1:eth1", "r3:eth3"]
    - endpoints: ["r1:eth2", "r4:eth3"]
    ## r2
    - endpoints: ["r2:eth1", "r5:eth3"]
    - endpoints: ["r2:eth2", "r6:eth3"]