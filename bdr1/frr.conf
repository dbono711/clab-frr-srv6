frr defaults traditional
hostname bdr1
log syslog
log file /etc/frr/logs/bdr1.log
log record-priority
log timestamp precision 3
no log unique-id
ipv6 forwarding
!
debug zebra srv6
debug bgp neighbor-events
debug bgp updates in
debug bgp updates out
debug isis sr-events
debug isis route-events
!
interface eth1
 description to_p2_eth2
 ipv6 address 2001:c0de:1:4::2/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface lo
 ipv6 address 2001:face::15/128
 ipv6 router isis 1
 isis passive
exit
!
interface internet0
 description internet
 ip address 99.99.99.99/32
exit
!
router bgp 65000
 bgp router-id 172.16.0.15
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor RRV6 peer-group
 neighbor RRV6 remote-as internal
 neighbor RRV6 update-source 2001:face::15
 neighbor RRV6 capability extended-nexthop
 neighbor 2001:face::8 peer-group RRV6
 !
 segment-routing srv6
  locator MAIN
  encap-behavior H_Encaps_Red
 exit
 !
 address-family ipv4 unicast
  network 99.99.99.99/32
  sid export auto
  neighbor RRV6 activate
  neighbor RRV6 next-hop-self
 exit-address-family
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.1721.6000.0015.00
 segment-routing srv6
  locator MAIN
 exit
exit
!
segment-routing
 srv6
  encapsulation
   source-address 2001:face::15
  exit
  locators
   locator MAIN
    prefix fcdd:dd00:0115::/48
    behavior usid
    format usid-f3216
   exit
   !
  exit
  !
 exit
 !
exit
!
end
