frr defaults traditional
hostname r5
ipv6 forwarding
!
interface eth1
 description to_r6_eth1
 ipv6 address 2001:c0de:1:4::1/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis network point-to-point
exit
!
interface eth2
 description to_r3_eth2
 ipv6 address 2001:c0de:1:2::2/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis network point-to-point
exit
!
interface eth3
 description to_r2_eth1
 ipv6 address 2001:c0de:1:7::2/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis network point-to-point
exit
!
interface lo
 description routerID
 ip address 5.5.5.5/32
 ipv6 address 2001:c0de:2::5/128
 ipv6 router isis 1
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.0000.0000.0005.00
exit
!
end
