frr defaults traditional
hostname p3
log syslog
log file /etc/frr/logs/p3.log
log record-priority
log timestamp precision 3
no log unique-id
ipv6 forwarding
!
debug isis route-events
debug mpls ldp events
!
interface eth1
 description to_p1_eth3
 ip address 172.16.10.5/31
 ip router isis 1
 ipv6 address 2001:c0de:1:3::2/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
 isis metric level-2 20
exit
!
interface eth2
 description RESERVED: to_pe1_eth2
exit
!
interface eth3
 description to_p4_eth2
 ip address 172.16.10.12/31
 ip router isis 1
 ipv6 address 2001:c0de:1:7::1/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface lo
 description routerID
 ip address 172.16.0.4/32
 ip router isis 1
 ipv6 address fcdd:dd00:0104::1/128
 ipv6 router isis 1
 isis passive
exit
!
mpls ldp
 router-id 172.16.0.4
 !
 address-family ipv4
  discovery transport-address 172.16.0.4
  !
  interface eth1
  exit
  !
  interface eth3
  exit
 exit-address-family
 !
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.1721.6000.0004.00
exit
!
end
