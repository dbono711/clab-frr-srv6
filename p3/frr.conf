frr defaults traditional
hostname p3
log syslog
log file /etc/frr/logs/p3.log
log record-priority
log timestamp precision 3
no log unique-id
ipv6 forwarding
!
debug isis route-events
!
interface eth1
 description to_p1_eth3
 ipv6 address 2001:c0de:1:3::2/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth2
 description RESERVED: to_pe1_eth2
exit
!
interface eth3
 description to_p4_eth2
 ipv6 address 2001:c0de:1:7::1/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis metric 100
 isis network point-to-point
exit
!
interface lo
 ipv6 address 2001:face::4/128
 ipv6 router isis 1
 isis passive
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.1721.6000.0004.00
exit
!
end
