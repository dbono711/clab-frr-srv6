frr defaults traditional
hostname rrv4
log syslog
log file /etc/frr/logs/rrv4.log
log record-priority
log timestamp precision 3
no log unique-id
!
debug bgp neighbor-events
debug bgp updates in
debug bgp updates out
debug isis route-events
debug mpls ldp events
!
route-map PERMIT_ALL permit 10
exit
!
interface eth1
 description to_p1_eth4
 ip address 172.16.10.7/31
 ip router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth2
 description to_p2_eth4
 ip address 172.16.10.9/31
 ip router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface lo
 description routerID
 ip address 8.8.8.8/32
 ip router isis 1
 isis passive
exit
!
router bgp 65000
 bgp router-id 8.8.8.8
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp cluster-id 8.8.8.8
 neighbor RRV4 peer-group
 neighbor RRV4 remote-as internal
 neighbor RRV4 update-source 8.8.8.8
 neighbor RRV4 capability extended-nexthop
 neighbor 1.1.1.1 peer-group RRV4
 neighbor 2.2.2.2 peer-group RRV4
 !
 address-family ipv4 vpn
  neighbor RRV4 activate
  neighbor RRV4 route-reflector-client
 exit-address-family
exit
!
mpls ldp
 router-id 8.8.8.8
 !
 address-family ipv4
  discovery transport-address 8.8.8.8
  !
  interface eth1
  exit
  !
  interface eth2
  exit
  !
 exit-address-family
 !
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.8888.8888.8888.00
exit
!
end