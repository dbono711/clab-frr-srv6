frr defaults traditional
hostname rrv4
log syslog
log file /etc/frr/logs/rrv4.log
log record-priority
log timestamp precision 3
no log unique-id
!
debug bgp neighbor-events
debug bgp updates in
debug bgp updates out
debug isis route-events
!
route-map PERMIT_ALL permit 10
exit
!
interface eth1
 description to_p1_eth4
 ip address 172.16.10.7/31
 ip router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface lo
 description routerID
 ip address 172.16.0.7/32
 ip router isis 1
 isis passive
exit
!
router bgp 65000
 bgp router-id 172.16.0.7
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp cluster-id 172.16.0.7
 neighbor RRV4 peer-group
 neighbor RRV4 remote-as internal
 neighbor RRV4 update-source 172.16.0.7
 neighbor 172.16.0.1 peer-group RRV4
 neighbor 172.16.0.6 peer-group RRV4
 !
 address-family ipv4 vpn
  neighbor RRV4 activate
  neighbor RRV4 route-reflector-client
 exit-address-family
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.1721.6000.0007.00
exit
!
end
