frr defaults traditional
hostname r4
ipv6 forwarding
!
interface eth1
 description to_r3_eth1
 ipv6 address 2001:c0de:1:1::2/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis network point-to-point
exit
!
interface eth2
 description to_r6_eth2
 ipv6 address 2001:c0de:1:3::1/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis metric level-1 10
 isis metric level-2 20
 isis network point-to-point
exit
!
interface eth3
 description to_r1_eth2
 ipv6 address 2001:c0de:1:6::2/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis metric level-1 10
 isis metric level-2 20
 isis network point-to-point
exit
!
interface lo
 description routerID
 ip address 4.4.4.4/32
 ipv6 address 2001:c0de:2::4/128
 ipv6 router isis 1
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.0000.0000.0004.00
exit
!
end
