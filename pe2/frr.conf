frr defaults traditional
hostname pe2
log syslog
log file /etc/frr/logs/pe2.log
log record-priority
log timestamp precision 3
no log unique-id
!
route-map PERMIT_ALL permit 10
exit
!
debug zebra srv6
debug bgp neighbor-events
debug bgp updates in
debug bgp updates out
debug isis sr-events
debug isis route-events
!
vrf RED
exit-vrf
!
interface eth1
 description to_p4_eth3
 ipv6 address 2001:c0de:1:8::2/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth2
 description RESERVED: to_p2_eth2
exit
!
interface eth3
 description to_c2_eth1
exit
!
interface eth3.10
 description to_c2_eth1.10_VRF_RED
 ip address 10.10.2.1/30
 ipv6 address 2001:c0de:10:2::1/64
exit
!
interface lo
 ipv6 address 2001:face::6/128
 ipv6 router isis 1
 isis passive
exit
!
router bgp 65000
 bgp router-id 172.16.0.6
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor RRV6 peer-group
 neighbor RRV6 remote-as internal
 neighbor RRV6 update-source 2001:face::6
 neighbor RRV6 capability extended-nexthop
 neighbor 2001:face::8 peer-group RRV6
 !
 segment-routing srv6
  locator MAIN
  encap-behavior H_Encaps_Red
 exit
 !
 address-family ipv4 vpn
  neighbor RRV6 activate
  neighbor RRV6 next-hop-self
 exit-address-family
 !
 address-family ipv6 vpn
  neighbor RRV6 activate
  neighbor RRV6 next-hop-self
 exit-address-family
exit
!
router bgp 65000 vrf RED
 bgp router-id 172.16.0.6
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator MAIN
 !
 address-family ipv4 unicast
  redistribute connected
  sid vpn export auto
  rd vpn export 172.16.0.6:10
  rt vpn both 65000:10
  export vpn
  import vpn
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute connected
  sid vpn export auto
  rd vpn export 172.16.0.6:10
  rt vpn both 65000:10
  export vpn
  import vpn
 exit-address-family
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.1721.6000.0006.00
 segment-routing srv6
  locator MAIN
 exit
exit
!
segment-routing
 srv6
  encapsulation
   source-address 2001:face::6
  exit
  locators
   locator MAIN
    prefix fcdd:dd00:106::/48
    behavior usid
    format usid-f3216
   exit
   !
  exit
  !
 exit
 !
exit
!
end
