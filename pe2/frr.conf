frr defaults traditional
hostname pe2
log syslog
log file /etc/frr/logs/pe2.log
log record-priority
log timestamp precision 3
no log unique-id
!
debug zebra srv6
debug bgp neighbor-events
debug bgp updates in
debug bgp updates out
debug isis sr-events
debug isis route-events
debug mpls ldp events
!
route-map PERMIT_ALL permit 10
exit
!
vrf RED
exit-vrf
!
interface eth1
 description to_p4_eth3
 ip address 172.16.10.15/31
 ip router isis 1
 ipv6 address 2001:c0de:1:8::2/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth2
 description RESERVED: to_p2_eth2
exit
!
interface eth3
 description to_c2_eth1
exit
!
interface eth3.10 vrf RED
 description to_c2_eth1.10_VRF_RED
 ip address 10.10.2.1/30
exit
!
interface lo
 description routerID
 ip address 2.2.2.2/32
 ip router isis 1
 ipv6 address 2001:db8:2::1/128
 ipv6 router isis 1
 isis passive
exit
!
router bgp 65000
 bgp router-id 2.2.2.2
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor RRV4 peer-group
 neighbor RRV4 remote-as internal
 neighbor RRV4 update-source 2.2.2.2
 neighbor RRV4 capability extended-nexthop
 neighbor 8.8.8.8 peer-group RRV4
 !
 address-family ipv4 vpn
  neighbor RRV4 activate
  neighbor RRV4 next-hop-self
 exit-address-family
exit
!
router bgp 65000 vrf RED
 bgp router-id 2.2.2.2
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  rd vpn export 2.2.2.2:10
  rt vpn both 65000:10
  export vpn
  import vpn
 exit-address-family
exit
!
mpls ldp
 router-id 2.2.2.2
 !
 address-family ipv4
  discovery transport-address 2.2.2.2
  !
  interface eth1
  exit
  !
 exit-address-family
 !
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.2222.2222.2222.00
exit
!
end