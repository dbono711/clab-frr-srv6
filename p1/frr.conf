frr defaults traditional
hostname p1
log syslog
log file /etc/frr/logs/p1.log
log record-priority
log timestamp precision 3
no log unique-id
ipv6 forwarding
!
debug isis route-events
!
interface eth1
 description to_pe1_eth1
 ipv6 address 2001:c0de:1:1::2/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth2
 description to_p2_eth1
 ipv6 address 2001:c0de:1:2::1/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth3
 description to_p3_eth1
 ipv6 address 2001:c0de:1:3::1/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth4
 description to_rrv6_eth1
 ipv6 address 2001:c0de:1:9::1/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface lo
 ipv6 address 2001:face::2/128
 ipv6 router isis 1
 isis passive
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.1721.6000.0002.00
exit
!
end
