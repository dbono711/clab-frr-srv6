frr defaults traditional
hostname p1
log syslog
log file /etc/frr/logs/p1.log
log record-priority
log timestamp precision 3
no log unique-id
!
debug zebra srv6
debug isis sr-events
debug isis route-events
debug mpls ldp events
!
interface eth1
 description to_pe1_eth1
 ip address 172.16.10.1/31
 ip router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth2
 description to_p2_eth1
 ip address 172.16.10.2/31
 ip router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth3
 description to_p3_eth1
 ip address 172.16.10.4/31
 ip router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
 isis metric level-2 20
exit
!
interface eth4
 description to_rrv4_eth1
 ip address 172.16.10.6/31
 ip router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface lo
 description routerID
 ip address 3.3.3.3/32
 ip router isis 1
 isis passive
exit
!
mpls ldp
 router-id 3.3.3.3
 !
 address-family ipv4
  discovery transport-address 3.3.3.3
  !
  interface eth1
  exit
  !
  interface eth2
  exit
  !
  interface eth3
  exit
  !
  interface eth4
  exit
 exit-address-family
 !
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.3333.3333.3333.00
exit
!
end