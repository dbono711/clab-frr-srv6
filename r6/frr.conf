frr defaults traditional
hostname r6
ip forwarding
ipv6 forwarding
!
interface eth1
 description to_r5_eth1
 ipv6 address 2001:c0de:1:4::2/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis network point-to-point
exit
!
interface eth2
 description to_r4_eth2
 ipv6 address 2001:c0de:1:3::2/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis metric level-1 10
 isis metric level-2 20
 isis network point-to-point
exit
!
interface eth3
 description to_r2_eth2
 ipv6 address 2001:c0de:1:8::2/64
 ipv6 router isis 1
 isis circuit-type level-2-only
 isis metric level-1 10
 isis metric level-2 20
 isis network point-to-point
exit
!
interface lo
 description routerID
 ip address 6.6.6.6/32
 ipv6 address 2001:c0de:2::6/128
 ipv6 address 2001:db8:1:6::1/128
 ipv6 router isis 1
 isis passive
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix 2001:db8:1:6::/64 block-len 40 node-len 24 func-bits 16
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.0000.0000.0006.00
 segment-routing srv6
  locator MAIN
exit
!
end
