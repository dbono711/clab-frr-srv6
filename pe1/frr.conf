frr defaults traditional
hostname pe1
log syslog
log file /etc/frr/logs/pe1.log
log record-priority
log timestamp precision 3
no log unique-id
!
route-map PERMIT_ALL permit 10
exit
!
debug zebra srv6
debug bgp neighbor-events
debug bgp updates in
debug bgp updates out
debug isis sr-events
debug isis route-events
!
vrf RED
exit-vrf
!
interface eth1
 description to_p1_eth1
 ipv6 address 2001:c0de:1:1::1/64
 ipv6 router isis 1
 isis hello padding during-adjacency-formation
 isis network point-to-point
exit
!
interface eth2
 description RESERVED: to_p3_eth2
exit
!
interface eth3
 description to_c1_eth1
exit
!
interface eth3.10
 description to_c1_eth1.10_VRF_RED
 ip address 10.10.1.1/30
 ipv6 address 2001:c0de:10:1::1/64
exit
!
interface eth4
 description to_c3_eth1
 ip address 10.11.1.1/30
exit
!
interface lo
 ipv6 address 2001:face::1/128
 ipv6 router isis 1
 isis passive
exit
!
router bgp 65000
 bgp router-id 172.16.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor RRV6 peer-group
 neighbor RRV6 remote-as internal
 neighbor RRV6 update-source 2001:face::1
 neighbor RRV6 capability extended-nexthop
 neighbor 2001:face::8 peer-group RRV6
 !
 segment-routing srv6
  locator MAIN
  encap-behavior H_Encaps_Red
 exit
 !
 address-family ipv4 vpn
  neighbor RRV6 activate
  neighbor RRV6 next-hop-self
 exit-address-family
 !
 address-family ipv6 vpn
  neighbor RRV6 activate
  neighbor RRV6 next-hop-self
 exit-address-family
 !
 address-family ipv4 unicast
  network 10.11.1.0/30
  sid export auto
  neighbor RRV6 activate
  neighbor RRV6 next-hop-self
 exit-address-family
exit
!
router bgp 65000 vrf RED
 bgp router-id 172.16.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 segment-routing srv6
  locator MAIN
 !
 address-family ipv4 unicast
  redistribute connected
  sid vpn export auto
  rd vpn export 172.16.0.1:10
  rt vpn both 65000:10
  export vpn
  import vpn
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute connected
  sid vpn export auto
  rd vpn export 172.16.0.1:10
  rt vpn both 65000:10
  export vpn
  import vpn
 exit-address-family
exit
!
router isis 1
 is-type level-2-only
 net 49.0001.1721.6000.0001.00
 segment-routing srv6
  locator MAIN
 exit
exit
!
segment-routing
 srv6
  encapsulation
   source-address 2001:face::1
  exit
  locators
   locator MAIN
    prefix fcdd:dd00:101::/48
    behavior usid
    format usid-f3216
   exit
   !
  exit
  !
 exit
 !
exit
!
end
